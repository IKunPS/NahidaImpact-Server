name: Build

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
        include:
          - os: windows-latest
            runtime: win-x64
          - os: ubuntu-latest
            runtime: linux-x64

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release --no-restore

    - name: Publish
      run: dotnet publish NahidaImpact/NahidaImpact.csproj -c Release -r ${{ matrix.runtime }} --self-contained true -o publish/${{ matrix.runtime }}

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: NahidaImpact-${{ matrix.runtime }}
        path: publish/${{ matrix.runtime }}
        retention-days: 30

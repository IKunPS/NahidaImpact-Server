syntax = "proto3";

// Nahida
// Proto

import "Vector.proto";

message BlossomBriefInfo {
	Vector pos = 7;
	uint32 map_layer_id = 2;
	uint32 monster_level = 5;
	uint32 reward_id = 3;
	uint32 resin = 9;
	uint32 circle_camp_id = 1;
	uint32 state = 6;
	uint32 city_id = 4;
	bool is_guide_opened = 11;
	uint32 refresh_id = 10;
	uint32 scene_id = 8;
}

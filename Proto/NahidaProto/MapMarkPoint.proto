syntax = "proto3";

// Nahida
// Proto

import "MapMarkFromType.proto";
import "MapMarkPointType.proto";
import "Vector.proto";

message MapMarkPoint {
	Vector pos = 3;
	string name = 2;
	MapMarkFromType from_type = 6;
	uint32 monster_id = 5;
	MapMarkPointType point_type = 4;
	uint32 map_layer_id = 8;
	uint32 scene_id = 1;
	uint32 quest_id = 7;
}

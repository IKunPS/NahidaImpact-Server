syntax = "proto3";

// Nahida
// Proto

import "AbilityString.proto";
import "PlayerDieType.proto";
import "StrengthenPointData.proto";

// CmdID: 28306
message DungeonPlayerDieNotify {
	AbilityString LICOPPFHGKK = 9;
	map<uint32, StrengthenPointData> strengthen_point_data_map = 2;
	uint32 wait_time = 14;
	uint32 murderer_entity_id = 15;
	uint32 revive_count = 7;
	PlayerDieType die_type = 6;
	uint32 dungeon_id = 12;
	uint32 PBNKLKDBECC = 11;
	oneof entity {
		uint32 monster_id = 4;
		uint32 gadget_id = 13;
	}
}

syntax = "proto3";

import "Equip.proto";
import "Furniture.proto";
import "Material.proto";
import "Facility.proto";

message Item {
  uint32 item_id = 1;
  uint64 guid = 2;
  oneof detail {
    // BeyondMaterial beyond_material = 8;
    Equip equip = 6;
    Furniture furniture = 7;
    Material material = 5;
    Facility facility = 9;
  }
}
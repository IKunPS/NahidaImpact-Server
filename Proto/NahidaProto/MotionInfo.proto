syntax = "proto3";

// Nahida
// Proto

import "MotionState.proto";
import "Vector.proto";

message MotionInfo {
	Vector speed = 3;
	repeated int32 BKMHKMOINKM = 100;
	Vector ref_pos = 6;
	Vector pos = 1;
	Vector rot = 2;
	repeated Vector params = 5;
	uint32 KPNCLEPDEPI = 10;
	uint32 scene_time = 8;
	MotionState state = 4;
	uint32 layer = 11;
	uint64 interval_velocity = 9;
	uint32 ref_id = 7;
}

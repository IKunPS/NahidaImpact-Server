syntax = "proto3";

import "AvatarInfo.proto";
import "AvatarTeam.proto";
import "AvatarRenameInfo.proto";

message AvatarDataNotify {
  repeated uint32 backup_avatar_team_order_list = 7;
  repeated uint32 owned_trace_effect_list = 11;
  repeated AvatarInfo avatar_list = 4;
  repeated uint64 temp_avatar_guid_list = 6;
  map<uint32, AvatarTeam> avatar_team_map = 3;
  repeated uint32 owned_costume_list = 1;
  repeated AvatarRenameInfo avatar_rename_list = 14;
  repeated uint32 owned_flycloak_list = 8;
  uint32 cur_avatar_team_id = 2;
  uint64 choose_avatar_guid = 12;
}
syntax = "proto3";

// Nahida
// Proto

import "AbilityControlBlock.proto";
import "AbilitySyncStateInfo.proto";
import "AvatarInfo.proto";
import "SceneAvatarInfo.proto";
import "SceneEntityInfo.proto";
import "ServerBuff.proto";

message SceneTeamAvatar {
	AbilitySyncStateInfo avatar_ability_info = 11;
	SceneEntityInfo scene_entity_info = 6;
	SceneAvatarInfo scene_avatar_info = 8;
	AvatarInfo avatar_info = 3;
	AbilitySyncStateInfo weapon_ability_info = 5;
	repeated ServerBuff server_buff_list = 7;
	AbilityControlBlock ability_control_block = 10;
	uint64 avatar_guid = 15;
	uint32 entity_id = 12;
	uint32 weapon_entity_id = 2;
	bool is_player_cur_avatar = 14;
	bool is_reconnect = 1;
	bool is_on_scene = 1054;
	uint32 player_uid = 13;
	uint64 weapon_guid = 9;
	uint32 scene_id = 4;
}

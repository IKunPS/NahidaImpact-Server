syntax = "proto3";

import "SceneEntityInfo.proto";
import "AbilitySyncStateInfo.proto";
import "AbilityControlBlock.proto";
import "ServerBuff.proto";
import "AvatarInfo.proto";
import "SceneAvatarInfo.proto";

message SceneTeamAvatar {
  AbilityControlBlock ability_control_block = 15;
  SceneEntityInfo scene_entity_info = 6;
  AbilitySyncStateInfo FDNFFNIMCNP = 11;
  AvatarInfo avatar_info = 3;
  repeated ServerBuff server_buff_list = 4;
  SceneAvatarInfo scene_avatar_info = 12;
  AbilitySyncStateInfo JLHNKELHLCF = 14;
  uint32 entity_id = 2;
  uint32 scene_id = 1;
  uint64 weapon_guid = 10;
  uint64 avatar_guid = 8;
  uint32 player_uid = 7;
  bool is_player_cur_avatar = 5;
  bool is_on_scene = 1318;
  bool is_reconnect = 9;
  uint32 weapon_entity_id = 13;
}
syntax = "proto3";

// Nahida
// Proto

import "AbilityInvokeArgument.proto";
import "AbilityInvokeEntryHead.proto";
import "ForwardType.proto";

message AbilityInvokeEntry {
	bytes ability_data = 9;
	AbilityInvokeEntryHead head = 3;
	bool is_ignore_auth = 5;
	uint32 entity_id = 1;
	double total_tick_time = 12;
	ForwardType forward_type = 2;
	AbilityInvokeArgument argument_type = 10;
	uint32 forward_peer = 4;
	uint32 event_id = 6;
}

syntax = "proto3";

import "AbilityInvokeEntryHead.proto";
import "AbilityInvokeArgument.proto";
import "ForwardType.proto";

message AbilityInvokeEntry {
  bytes ability_data = 8;
  AbilityInvokeEntryHead head = 15;
  bool is_ignore_auth = 1;
  uint32 event_id = 2;
  double total_tick_time = 3;
  uint32 entity_id = 7;
  uint32 forward_peer = 6;
  ForwardType forward_type = 9;
  AbilityInvokeArgument argument_type = 5;
}

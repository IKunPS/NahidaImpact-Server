syntax = "proto3";

// Nahida
// Proto

message AnnounceData {
	string center_system_text = 8;
	string count_down_text = 4;
	string dungeon_confirm_text = 9;
	bool is_center_system_last_5_every_minutes = 15;
	uint32 center_system_frequency = 1;

syntax = "proto3";

import "ServerBuff.proto";
import "PlayerDieType.proto";

// CmdID: 21104
message AvatarLifeStateChangeNotify {
  string attack_tag = 15;
  repeated string JHHCACAKIDH = 6;
  repeated ServerBuff server_buff_list = 7;
  uint32 client_sequence_id = 12;
  uint32 move_reliable_seq = 10;
  uint32 source_entity_id = 14;
  uint32 life_state = 9;
  uint64 avatar_guid = 4;
  uint32 IAOLAMKOGKH = 8;
  PlayerDieType die_type = 3;
}
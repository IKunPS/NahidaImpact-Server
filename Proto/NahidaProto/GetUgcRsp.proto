syntax = "proto3";

// Nahida
// Proto

import "RecordUsage.proto";
import "UgcLanV5CardBriefInfo.proto";
import "UgcLanV5CardRecord.proto";
import "UgcMusicBriefInfo.proto";
import "UgcMusicRecord.proto";
import "UgcShortVideoBriefInfo.proto";
import "UgcShortVideoRecord.proto";
import "UgcType.proto";

// CmdID: 2191
message GetUgcRsp {
	int32 retcode = 15;
	uint64 ugc_guid = 10;
	RecordUsage ugc_record_usage = 3;
	UgcType ugc_type = 12;
	oneof record {
		UgcLanV5CardRecord lan_v_5_card_record = 2;
		UgcShortVideoRecord short_video_record = 4;
		UgcMusicRecord music_record = 7;
	}
	oneof brief {
		UgcShortVideoBriefInfo short_video_brief_info = 470;
		UgcLanV5CardBriefInfo lan_v_5_card_brief_info = 1031;
		UgcMusicBriefInfo music_brief_info = 1937;
	}
}

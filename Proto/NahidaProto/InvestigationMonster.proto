syntax = "proto3";

// Nahida
// Proto

import "InvestigationMonsterDetail.proto";

message InvestigationMonster {
	enum LockState {
		LockState_LOCK_NONE = 0;
		LockState_LOCK_QUEST = 1;
	}
	repeated InvestigationMonsterDetail investigation_monster_detail_list = 1149;
	uint32 id = 15;
	LockState lock_state = 10;
	uint32 city_id = 14;
}

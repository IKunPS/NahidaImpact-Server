syntax = "proto3";

// Nahida
// Proto

import "BattlePassCycle.proto";
import "BattlePassProduct.proto";
import "BattlePassRewardPlanOption.proto";
import "BattlePassRewardTag.proto";
import "BattlePassUnlockStatus.proto";

message BattlePassSchedule {
	repeated BattlePassRewardTag reward_taken_list = 9;
	BattlePassCycle cur_cycle = 15;
	repeated BattlePassRewardPlanOption reward_plan_option_list = 2;
	BattlePassProduct product_info = 13;
	uint32 cur_cycle_points = 4;
	bool is_copy_reward_preference_to_all_schedule = 11;
	bool is_extra_paid_reward_taken = 3;
	bool is_viewed = 14;
	BattlePassUnlockStatus unlock_status = 5;
	uint32 level = 10;
	uint32 schedule_id = 12;
	uint32 paid_platform_flags = 8;
	uint32 end_time = 1;
	uint32 begin_time = 6;
	uint32 point = 7;
}

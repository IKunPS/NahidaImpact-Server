syntax = "proto3";

option java_package = "emu.grasscutter.save.proto";
option java_outer_classname = "PlayerSaveBinOuterClass";

// hk4e-aligned player data binary save format
// All player data is serialized into a single binary blob

message PlayerSaveBin {
  int32 uid = 1;
  int64 save_version = 2;
  int64 save_timestamp = 3;

  PlayerBasicBin basic = 10;
  repeated AvatarBin avatars = 20;
  repeated ItemBin items = 30;
  repeated MainQuestBin quests = 40;
  HomeBin home = 50;
  repeated FriendshipBin friendships = 60;
  repeated MailBin mails = 70;
  BattlePassBin battle_pass = 80;
  AchievementsBin achievements = 90;
  repeated ActivityBin activities = 100;
  repeated SceneBuildBin scene_builds = 110;
  repeated SceneGroupInstanceBin group_instances = 120;
  repeated GachaRecordBin gacha_records = 130;
  DailyTaskBin daily_task = 140;
}

// ==================== Daily Task ====================

message DailyTaskBin {
  int32 filter_city_id = 1;
  int32 finished_num = 2;
  bool is_taken_score_reward = 3;
  int32 last_refresh_time = 4;
  repeated DailyTaskEntryBin task_list = 5;
  map<int32, IntList> task_vars = 6;
  map<int32, int32> cycle_quest_count = 7;
  repeated int32 sure_pool = 8;
  repeated IntList possible_pools = 9;
}

message DailyTaskEntryBin {
  int32 daily_task_id = 1;
  int32 reward_id = 2;
  int32 progress = 3;
  bool is_finished = 4;
}

// ==================== Position ====================

message PositionBin {
  float x = 1;
  float y = 2;
  float z = 3;
}

// ==================== Helper types ====================

message IntList {
  repeated int32 values = 1;
}

// ==================== Player Basic ====================

message PlayerBasicBin {
  string account_id = 1;
  string nickname = 2;
  string signature = 3;
  int32 head_image = 4;
  int32 name_card_id = 5;

  PositionBin position = 10;
  PositionBin rotation = 11;
  int32 scene_id = 12;
  int32 region_id = 13;

  map<int32, int32> properties = 20;
  map<int32, int32> open_states = 21;

  // Collections
  repeated int32 name_card_list = 30;
  repeated int32 flycloak_list = 31;
  repeated int32 costume_list = 32;
  map<int32, IntList> unlocked_weapons = 33;
  repeated int32 unlocked_weapon_skins = 34;

  // Moon card
  int32 moon_card_duration = 40;
  int32 moon_card_last_daily = 41;
  int32 moon_card_remain_reward = 42;
  int32 moon_card_get_time = 43;

  // Game time
  int64 player_game_time = 50;

  // Managers
  TeamManagerBin team_manager = 60;
  CodexBin codex = 61;
  GachaInfoBin gacha_info = 62;
  TowerDataBin tower_data = 63;

  // Shop limits
  repeated ShopLimitBin shop_limits = 70;

  // Expeditions
  map<int64, ExpeditionInfoBin> expedition_info = 71;

  // City info
  repeated CityInfoBin city_info_list = 72;

  // Player progress
  PlayerProgressBin player_progress = 80;

  // Collection records
  PlayerCollectionRecordsBin collection_records = 81;

  // Map marks
  repeated MapMarkBin map_marks = 82;

  // Quest global variables
  map<int32, int32> quest_global_variables = 83;

  // Forging/cooking
  repeated ActiveForgeBin active_forges = 84;
  map<int32, ActiveCookCompoundBin> active_cook_compounds = 85;

  // Player profile
  PlayerProfileBin profile = 86;

  // Scene tags
  map<int32, IntList> scene_tags = 87;

  // Resin
  int32 resin = 88;

  // Unlocked combines
  repeated int32 unlocked_combines = 89;
  repeated int32 unlocked_recipes = 90;

  // Chat emojis
  repeated int32 chat_emoji_id_list = 91;

  // Rewarded levels
  repeated int32 rewarded_levels = 92;

  // MP setting
  int32 mp_setting = 93;

  // Data version
  int32 data_version = 94;

  // Previous scene & home position
  int32 prev_scene = 95;
  PositionBin prev_pos_for_home = 96;

  // Resin manager state
  int64 next_resin_recovery = 97;

  // Main character gender
  int32 main_char_id = 98;

  // Player flags (hk4e: persisted in PlayerDataBin)
  bool is_new_account_enter_game = 99;
  string last_build_git_hash = 100;
  int32 main_character_element = 101;

  // hk4e: unlocked scene points (waypoints/teleport points) and areas
  map<int32, IntList> unlocked_scene_points = 102;
  map<int32, IntList> unlocked_scene_areas = 103;
}

// ==================== Avatar ====================

message AvatarBin {
  bytes object_id = 1;  // ObjectId bytes
  int32 avatar_id = 2;
  int32 level = 3;
  int32 exp = 4;
  int32 promote_level = 5;
  float current_hp = 6;
  float current_energy = 7;
  int32 satiation_val = 8;
  int32 satiation_penalty_time = 9;

  map<int32, int32> skill_level_map = 10;
  map<int32, int32> skill_extra_charge_map = 11;
  map<int32, int32> proud_skill_bonus_map = 12;
  repeated int32 talent_id_list = 13;

  int32 fly_cloak = 14;
  int32 costume = 15;
  int32 weapon_skin_id = 16;
  int32 born_time = 17;
  int32 fetter_level = 18;
  int32 fetter_exp = 19;
  int32 trace_effect = 20;

  int32 cur_skill_depot_id = 21;

  map<int32, int32> fight_properties = 22;

  // Equipped items (guid -> item)
  repeated ItemBin equipped_items = 23;
}

// ==================== Item ====================

message ItemBin {
  bytes object_id = 1;  // ObjectId bytes
  int32 item_id = 2;
  int32 count = 3;
  int32 level = 4;
  int32 exp = 5;
  int32 promote_level = 6;
  bool locked = 7;
  bool favourite = 8;

  // Weapon
  repeated int32 affixes = 10;
  int32 refinement = 11;

  // Reliquary
  int32 main_prop_id = 12;
  repeated int32 append_prop_id_list = 13;

  int32 equip_character = 14;
  int64 guid = 15;

  int32 total_exp = 16;
}

// ==================== Quest ====================

message MainQuestBin {
  bytes object_id = 1;
  int32 parent_quest_id = 2;
  int32 state = 3;
  bool is_finished = 4;

  repeated ChildQuestBin child_quests = 10;
  repeated int32 quest_vars = 11;
  repeated int64 time_var = 12;
  repeated QuestGroupSuiteBin quest_group_suites = 13;
  map<int32, TalkDataBin> talks = 14;
  int32 accept_time = 15;
}

message ChildQuestBin {
  int32 sub_quest_id = 1;
  int32 state = 2;
  int32 start_time = 3;
  int32 accept_time = 4;
  int32 finish_time = 5;
  int32 start_game_day = 6;
  repeated int32 finish_progress_list = 7;
  repeated int32 fail_progress_list = 8;
}

message QuestGroupSuiteBin {
  int32 scene_id = 1;
  int32 group = 2;
  int32 suite = 3;
}

message TalkDataBin {
  int32 id = 1;
  int32 cur_progress = 2;
}

// ==================== Home ====================

message HomeBin {
  int32 level = 1;
  int64 stored_coin = 2;
  int64 stored_fetter_exp = 3;
  repeated FurnitureMakeSlotBin make_slots = 4;
  map<int32, HomeSceneBin> scene_map = 5;
  repeated int32 unlocked_home_bgm = 6;
  repeated int32 finished_talk_id_list = 7;
  repeated int32 finished_reward_event_id_list = 8;
  int32 last_coin_time = 9;
  int32 last_fetter_time = 10;
  int32 enter_home_option = 11;
}

message FurnitureMakeSlotBin {
  int32 index = 1;
  int32 make_id = 2;
  int64 begin_time = 3;
  int32 dur = 4;
  int32 avatar_id = 5;
}

message HomeSceneBin {
  int32 scene_id = 1;
  repeated HomeBlockBin blocks = 2;
  int32 born_pos_scene_id = 3;
  int32 tmp_version = 4;
  int32 comfort = 5;
  bool unlocked = 6;
}

message HomeBlockBin {
  int32 block_id = 1;
  repeated HomeFurnitureBin deploy_furnitures = 2;
  repeated HomeNpcBin deploy_npcs = 3;
  repeated HomeAnimalBin deploy_animals = 4;
  bool unlocked = 5;
  int32 comfort_value = 6;
}

message HomeFurnitureBin {
  int32 furniture_id = 1;
  PositionBin position = 2;
  PositionBin rotation = 3;
  int32 parent_furniture_index = 4;
  int32 guid = 5;
  int32 version = 6;
  int32 spawn_id = 7;
}

message HomeNpcBin {
  int32 avatar_id = 1;
  PositionBin position = 2;
  PositionBin rotation = 3;
  int32 costume_id = 4;
}

message HomeAnimalBin {
  int32 furniture_id = 1;
  PositionBin position = 2;
  PositionBin rotation = 3;
}

// ==================== Team Manager ====================

message TeamManagerBin {
  int32 current_team_index = 1;
  int32 current_char_index = 2;
  map<int32, TeamInfoBin> teams = 3;
}

message TeamInfoBin {
  string name = 1;
  repeated int64 avatar_guids = 2;
}

// ==================== Friendship ====================

message FriendshipBin {
  bytes object_id = 1;
  int32 owner_id = 2;
  int32 friend_id = 3;
  bool is_friend = 4;
  int32 ask_time = 5;

  PlayerProfileBin profile = 10;
}

// ==================== Mail ====================

message MailBin {
  bytes object_id = 1;
  int32 owner_uid = 2;
  MailContentBin content = 3;
  repeated MailItemBin item_list = 4;
  int64 send_time = 5;
  int64 expire_time = 6;
  int32 importance = 7;
  bool is_read = 8;
  bool is_attachment_got = 9;
  int32 state_value = 10;
  int32 collect_state = 11;
}

message MailContentBin {
  string title = 1;
  string content = 2;
  string sender = 3;
}

message MailItemBin {
  int32 item_id = 1;
  int32 item_count = 2;
  int32 item_level = 3;
}

// ==================== BattlePass ====================

message BattlePassBin {
  int32 point = 1;
  int32 cycle_points = 2;
  int32 level = 3;
  bool viewed = 4;

  repeated BattlePassMissionBin missions = 10;
  repeated int32 taken_rewards = 11;
}

message BattlePassMissionBin {
  int32 mission_id = 1;
  int32 cur_progress = 2;
  int32 status = 3;
}

// ==================== Achievements ====================

message AchievementsBin {
  map<int32, AchievementBin> achievement_map = 1;
}

message AchievementBin {
  int32 status = 1;
  int32 cur_progress = 2;
  int32 total_progress = 3;
  int32 finish_timestamp = 4;
}

// ==================== Activity ====================

message ActivityBin {
  int32 uid = 1;
  int32 activity_id = 2;
  map<int32, int32> watcher_info_map = 3;
  string detail = 4;  // JSON string for activity-specific data
}

// ==================== Scene Build ====================

message SceneBuildBin {
  bytes object_id = 1;
  int32 owner_uid = 2;
  int32 scene_id = 3;
  int32 gadget_id = 4;
  int32 config_id = 5;
  int32 group_id = 6;
  int32 entity_id = 7;
  PositionBin position = 8;
  PositionBin rotation = 9;
  int32 state = 10;
  int32 op_type = 11;
  int32 build_id = 12;
}

// ==================== Scene Group Instance ====================

message SceneGroupInstanceBin {
  bytes object_id = 1;
  int32 owner_uid = 2;
  int32 group_id = 3;
  int32 target_suite = 4;
  int32 last_suite = 5;
  bool is_generated = 6;
  int32 gadget_state = 7;

  repeated int32 dead_entities = 10;
  map<string, int32> cached_variables = 11;
  int32 last_value_index = 12;
  repeated int32 value_list = 13;
  int32 suite_index = 14;
  bool lua_trigger = 15;
  int32 refresh_time = 16;
  map<int32, int32> cached_gadget_states = 17;
}

// ==================== Gacha Record ====================

message GachaRecordBin {
  bytes object_id = 1;
  int32 owner_id = 2;
  int32 gacha_type = 3;
  int32 item_id = 4;
  int64 transaction_date = 5;
}

// ==================== Sub-component messages ====================

message CodexBin {
  repeated int32 unlocked_weapon = 1;
  repeated int32 unlocked_animal = 2;
  repeated int32 unlocked_material = 3;
  repeated int32 unlocked_book = 4;
  repeated int32 unlocked_tips = 5;
  repeated int32 unlocked_view = 6;
  repeated int32 unlocked_reliquary = 7;
  map<int32, IntList> unlocked_suitelist = 8;
}

message GachaInfoBin {
  map<int32, GachaBannerInfoBin> banner_info = 1;
}

message GachaBannerInfoBin {
  int32 pity5 = 1;
  int32 pity4 = 2;
  int32 failed_featured5_count = 3;
  int32 failed_featured4_item_count = 4;
  int32 wish_max_progress = 5;
  int32 failed_chosen_item_count = 6;
  int32 chosen_item_id = 7;
  int32 wish_progress = 8;
  int32 failed_featured4_count = 9;
}

message TowerDataBin {
  int32 current_floor_id = 1;
  int32 current_level = 2;
  map<int32, int32> recorded_floor_map = 3;
  int32 run_star_count = 4;
  bool skip_floor_failed = 5;
  int32 entry_scene = 6;
  int32 entry_dungeon = 7;
  map<int32, TowerLevelRecordBin> record_map = 8;
}

message TowerLevelRecordBin {
  int32 floor_id = 1;
  map<int32, int32> passed_level_map = 2;
  int32 floor_star_reward_progress = 3;
}

message ShopLimitBin {
  int32 shop_type = 1;
  int32 next_refresh_time = 2;
  map<int32, int32> shop_limit_map = 3;
}

message ExpeditionInfoBin {
  int32 avatar_id = 1;
  int32 expedition_id = 2;
  int32 hour_time = 3;
  int64 start_time = 4;
}

message CityInfoBin {
  int32 city_id = 1;
  int32 level = 2;
  int32 crystal_num = 3;
}

message PlayerProgressBin {
  map<int32, int32> item_history = 1;
  repeated int32 dungeon_ids = 2;
  map<int32, IntList> item_givings = 3;
  map<string, int32> quest_progress_map = 4;
  repeated ItemGiveRecordBin item_give_records = 5;
  map<int32, BargainRecordBin> bargain_records = 6;
}

message ItemGiveRecordBin {
  int32 giving_id = 1;
  int32 config_id = 2;
  int32 group_id = 3;
  int32 last_group_id = 4;
  bool is_finished = 5;
  bool is_gadget_giving = 6;
  map<int32, int32> given_items = 7;
}

message BargainRecordBin {
  int32 bargain_id = 1;
  int32 cur_progress = 2;
  int32 target = 3;
  int32 max_points = 4;
  int32 min_points = 5;
}

message PlayerCollectionRecordsBin {
  map<int32, IntList> records = 1;
}

message MapMarkBin {
  int32 scene_id = 1;
  string name = 2;
  PositionBin position = 3;
  int32 point_type = 4;
  int32 monster_id = 5;
  int32 from_type = 6;
  int32 quest_id = 7;
}

message ActiveForgeBin {
  int32 forge_id = 1;
  int32 avatar_id = 2;
  int32 count = 3;
  int64 start_time = 4;
  int32 forge_point = 5;
}

message ActiveCookCompoundBin {
  int32 compound_id = 1;
  int32 count = 2;
  int64 active_time = 3;
}

message PlayerProfileBin {
  int32 uid = 1;
  string nickname = 2;
  string signature = 3;
  int32 head_image = 4;
  int32 name_card = 5;
  int32 adventure_rank = 6;
  int32 world_level = 7;
  int32 last_active_time = 8;
  repeated int32 show_avatar_ids = 9;
  repeated int32 show_name_card_ids = 10;
}

message GlobalOnlinePlayerBin {
  int32 uid = 1;
  string nickname = 2;
  int32 level = 3;
  int32 world_level = 4;
  string node_region = 5;
  int32 head_image = 6;
  string signature = 7;
  int64 last_active_time = 8;
  bool is_online = 9;
  int32 name_card_id = 10;
  int32 scene_id = 11;
}

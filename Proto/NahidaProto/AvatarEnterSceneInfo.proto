syntax = "proto3";

import "ServerBuff.proto";
import "AbilitySyncStateInfo.proto";

message AvatarEnterSceneInfo {
  AbilitySyncStateInfo JLHNKELHLCF = 3;
  repeated ServerBuff server_buff_list = 1;
  repeated uint32 buff_id_list = 11;
  AbilitySyncStateInfo FDNFFNIMCNP = 6;
  uint32 weapon_entity_id = 10;
  uint32 avatar_entity_id = 2;
  uint64 avatar_guid = 15;
  uint64 weapon_guid = 4;
}
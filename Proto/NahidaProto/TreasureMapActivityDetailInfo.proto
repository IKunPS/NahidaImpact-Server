syntax = "proto3";

// Nahida
// Proto

import "TreasureMapBonusChallengeInfo.proto";
import "TreasureMapRegionInfo.proto";

message TreasureMapActivityDetailInfo {
	repeated TreasureMapBonusChallengeInfo bonus_challenge_list = 6;
	repeated TreasureMapRegionInfo region_info_list = 15;
	uint32 active_region_index = 14;
	uint32 total_mp_spot_num = 4;
	uint32 currency_num = 1;
	uint32 treasure_close_time = 5;
	uint32 preview_reward_id = 12;
	uint32 min_open_player_level = 7;
	bool is_mp_challenge_touched = 2;
}

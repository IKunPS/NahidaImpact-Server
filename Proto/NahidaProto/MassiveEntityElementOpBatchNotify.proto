syntax = "proto3";

// Nahida
// Proto

import "ShapeBox.proto";
import "ShapeSphere.proto";

// CmdID: 29482
message MassiveEntityElementOpBatchNotify {
	uint32 attacker_id = 13;
	float attack_element_durability = 9;
	int32 source_element_type = 15;
	uint32 op_idx = 5;
	uint32 user_id = 8;
	int32 entity_type = 1;
	int32 reaction_source_type = 11;
	oneof check_shape {
		ShapeSphere shape_sphere = 7;
		ShapeBox shape_box = 6;
	}
}

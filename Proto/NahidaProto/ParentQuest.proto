syntax = "proto3";

// Nahida
// Proto

import "ChildQuest.proto";
import "InferencePageInfo.proto";
import "ParentQuestRandomInfo.proto";

message ParentQuest {
	map<uint32, uint32> time_var_map = 9;
	repeated InferencePageInfo inference_page_list = 15;
	ParentQuestRandomInfo random_info = 4;
	repeated ChildQuest child_quest_list = 1;
	repeated int32 quest_var = 13;
	// [obf] repeated GCOJDICJGKK LNFIAFHCDOO = 10;
	uint32 parent_quest_id = 7;
	uint32 parent_quest_state = 11;
	bool is_random = 3;
	bool OFFFGMMAMIN = 5;
	bool is_focus_mode = 14;
	bool is_finished = 8;
	uint32 accept_time = 12;
	uint64 video_key = 6;
	uint32 quest_var_seq = 2;
}

import "FungusFighterMonsterDetail.proto";
import "FungusTrainingPoolPreviewDetail.proto";

message FungusTrainingProgressDetail {
	repeated uint32 backup_monster_list = 8;
	repeated FungusFighterMonsterDetail monster_detail_list = 11;
	repeated uint32 choosen_monster_list = 13;
	repeated FungusTrainingPoolPreviewDetail monster_pool_preview_list = 2;

import "RogueShowAvatarTeamInfo.proto";
import "RoguelikeRuneRecord.proto";

message RogueStageInfo {
	repeated RoguelikeRuneRecord rune_record_list = 10;
	RogueShowAvatarTeamInfo avatar_team = 4;
	uint32 revise_monster_level = 544;
	bool is_explored = 6;
	bool is_taken_reward = 9;
	uint32 NCPPBJLCLHP = 13;

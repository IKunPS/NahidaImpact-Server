	bool is_passed = 2;
	bool is_in_combat = 12;
	uint32 IOMEMEJLCCE = 3;
	uint32 stage_id = 5;
	uint32 PDAMMGLBAKM = 1131;
	uint32 max_passed_level = 14;
	uint32 coin_c_num = 1;
	uint32 cur_level = 7;
}

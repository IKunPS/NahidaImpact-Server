syntax = "proto3";

// Nahida
// Proto

import "LackingResourceInfo.proto";

message Quest {
	LackingResourceInfo lacking_resource_info = 13;
	repeated uint32 mutual_place_list = 12;
	repeated uint32 finish_progress_list = 10;
	repeated uint32 fail_progress_list = 11;
	uint32 state = 2;
	bool is_random = 5;
	uint32 start_time = 4;
	uint32 parent_quest_id = 6;
	uint32 unlock_time = 14;
	uint32 start_game_time = 8;
	uint32 quest_id = 1;
	uint32 accept_time = 9;
	uint32 quest_config_id = 7;
}

syntax = "proto3";

// Nahida
// Proto

import "PlayerDieType.proto";
import "ServerBuff.proto";

// CmdID: 28860
message LifeStateChangeNotify {
	repeated string JHHCACAKIDH = 10;
	string attack_tag = 4;
	repeated ServerBuff server_buff_list = 12;
	PlayerDieType die_type = 2;
	uint32 source_entity_id = 6;
	uint32 life_state = 8;
	uint32 move_reliable_seq = 13;
	uint32 IAOLAMKOGKH = 14;
	uint32 entity_id = 1;
	uint32 client_sequence_id = 15;
}

syntax = "proto3";

// Nahida
// Proto

message Reliquary {
	repeated uint32 definite_append_prop_id_list = 8;
	repeated uint32 append_prop_id_list = 5;
	repeated uint32 purchased_append_prop_id_list = 7;
	uint32 promote_level = 3;
	uint32 level = 1;
	uint32 main_prop_id = 4;
	uint32 exp = 2;
	bool is_relic_starred = 6;
}

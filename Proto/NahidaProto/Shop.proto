syntax = "proto3";

// Nahida
// Proto

import "ShopBeyondMcoinProduct.proto";
import "ShopCardProduct.proto";
import "ShopConcertProduct.proto";
import "ShopGoods.proto";
import "ShopMcoinProduct.proto";

message Shop {
	repeated ShopConcertProduct concert_product_list = 7;
	repeated ShopMcoinProduct mcoin_product_list = 14;
	// [obf] ALKBPNIPEBD CCLNKONMOAJ = 15;
	repeated ShopCardProduct card_product_list = 9;
	repeated ShopBeyondMcoinProduct beyond_mcoin_product_list = 1;
	repeated ShopGoods goods_list = 13;
	uint32 shop_type = 5;
	uint32 next_refresh_time = 12;
	uint32 NEKALCAIFKH = 6;
	uint32 city_reputation_level = 8;
	uint32 city_id = 11;
}

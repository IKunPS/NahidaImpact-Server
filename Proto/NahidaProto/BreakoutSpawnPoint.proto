syntax = "proto3";
 
import "BreakoutPhysicalObject.proto";
import "Vector2Int.proto";

message BreakoutSpawnPoint {
	uint32 JBJJKLFINGN = 5;
	uint32 brick_suite_id = 2;
	uint32 OGEPMBDDPOB = 4;
	uint32 id = 1;
	repeated int32 int_param_list = 7;
